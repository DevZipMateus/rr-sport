<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrine Online — R.R Sport</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
    }

    :root {
      --yellow: #F5C800;
      --yellow-dark: #D4AB00;
      --green: #1E8C14;
      --green-light: #27A318;
      --black: #0A0A0A;
      --dark: #111111;
      --card: #161616;
      --border: #252525;
      --text: #FFFFFF;
      --muted: #9CA3AF;
      --header-h: 72px;
    }

    a { text-decoration: none; color: inherit; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px; border-radius: 6px;
      font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 500;
      letter-spacing: 0.04em; transition: all 0.25s ease; cursor: pointer;
      border: 2px solid transparent;
    }
    .btn-primary {
      background: var(--yellow); color: #0A0A0A;
      border-color: var(--yellow);
    }
    .btn-primary:hover { background: var(--yellow-dark); border-color: var(--yellow-dark); }

    /* ===== HEADER ===== */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: var(--header-h);
      background: rgba(10,10,10,0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow 0.3s;
    }
    .header-inner {
      height: 100%; display: flex; align-items: center;
      justify-content: space-between; gap: 24px;
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-logo img { height: 48px; width: auto; object-fit: contain; }
    .nav { display: flex; align-items: center; gap: 4px; }
    .nav a {
      color: var(--muted); font-size: 0.9rem; font-weight: 500;
      padding: 6px 14px; border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    .nav a:hover, .nav a.active { color: var(--yellow); background: rgba(245,200,0,0.08); }
    .header-cta { display: flex; align-items: center; gap: 10px; }
    .header-cta .btn { padding: 8px 18px; font-size: 0.88rem; }

    /* Hamburger */
    .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .menu-toggle span { display: block; width: 24px; height: 2px; background: #fff; border-radius: 2px; transition: all 0.3s; }
    .mobile-menu {
      display: none; position: fixed; top: var(--header-h); left: 0; right: 0;
      background: #111; border-bottom: 1px solid var(--border);
      padding: 20px 24px; flex-direction: column; gap: 4px; z-index: 999;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { color: var(--muted); padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 1rem; }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: var(--yellow); }

    @media (max-width: 768px) {
      .nav, .header-cta { display: none; }
      .menu-toggle { display: flex; }
      .header-inner { padding: 0 16px; }
    }

    /* ===== IFRAME WRAPPER ===== */
    .vitrine-wrap {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0; bottom: 0;
    }
    #vitrine-frame {
      width: 100%; height: 100%;
      border: none; display: block;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div class="header-inner">
    <a href="index.html" class="header-logo" aria-label="R.R Sport — página inicial">
      <img src="logo.png" alt="Logo R.R Sport">
    </a>
    <nav class="nav" aria-label="Navegação principal">
      <a href="index.html#sobre">Sobre</a>
      <a href="index.html#produtos">Produtos</a>
      <a href="vitrine.html" class="active">Vitrine</a>
      <a href="index.html#personalizacao">Personalização</a>
      <a href="index.html#contato">Contato</a>
    </nav>
    <div class="header-cta">
      <a href="https://wa.me/5500000000000" class="btn btn-primary" aria-label="Falar pelo WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </a>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- MOBILE MENU -->
<nav class="mobile-menu" id="mobileMenu" aria-label="Menu mobile">
  <a href="index.html#sobre">Sobre</a>
  <a href="index.html#produtos">Produtos</a>
  <a href="vitrine.html" style="color: var(--yellow);">Vitrine</a>
  <a href="index.html#personalizacao">Personalização</a>
  <a href="index.html#contato">Contato</a>
  <a href="https://wa.me/5500000000000" style="color: var(--yellow); font-weight: 600;">WhatsApp</a>
</nav>

<!-- VITRINE IFRAME -->
<div class="vitrine-wrap">
  <iframe
    id="vitrine-frame"
    src="https://rrsport.egestor.com.br/vitrine/"
    title="Vitrine online R.R Sport"
    allowfullscreen
    loading="eager"
  ></iframe>
</div>

<script>
  // Hamburger toggle
  const toggle = document.getElementById('menuToggle');
  const menu   = document.getElementById('mobileMenu');
  toggle.addEventListener('click', () => {
    const open = menu.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open);
  });
  // Close menu on link click
  menu.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      menu.classList.remove('open');
      toggle.setAttribute('aria-expanded', false);
    });
  });
</script>

</body>
</html>
